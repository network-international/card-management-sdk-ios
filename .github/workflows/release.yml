name: Build Release XCFramework

on:
  release:
    types: [published]

jobs:
  build:
    name: Build XCFramework and upload release asset
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build NICardManagementSDK XCFramework
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          chmod +x ./scripts/build-xcframework.sh
          ./scripts/build-xcframework.sh

      - name: Upload XCFramework release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release/NICardManagementSDK-${{ github.event.release.tag_name }}.zip
          asset_name: NICardManagementSDK-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
